name: Article Ingestion

on:
  schedule:
    - cron: '7,37 * * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual ingestion'
  
  repository_dispatch:
    types: [external-cron]

jobs:
  ingest:
    name: Ingest & analyze articles
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger ingestion pipeline
        id: ingest
        run: |
          # Strip any trailing slash from APP_URL to avoid double-slash
          APP_URL="${{ secrets.APP_URL }}"
          APP_URL="${APP_URL%/}"

          echo "Triggering ingestion at $(date -u)"
          echo "Endpoint: ${APP_URL}/api/ingest"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -L \
            "${APP_URL}/api/ingest" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 300)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP status: $HTTP_CODE"
          echo "Response: $BODY"
          echo "response=$BODY" >> "$GITHUB_OUTPUT"
          echo "status=$HTTP_CODE" >> "$GITHUB_OUTPUT"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "❌ Ingestion failed with status $HTTP_CODE"
            exit 1
          fi

          echo "✅ Ingestion succeeded"

      - name: Parse result
        if: success()
        run: |
          echo "Ingestion result: ${{ steps.ingest.outputs.response }}"
